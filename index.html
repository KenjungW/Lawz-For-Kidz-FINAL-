<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Law For Kidz</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="/w3css/3/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
</head>


<body>

<!-- This is the top section -->
<div class="loader-container" id="loader">
    <div class="gavel-single"></div>
</div>

<div class="Section_top"></div>
<!-- Header -->
    <header>
        <div class ="white2">
            <h1>Law For Kidz</h1>
        </div>
    </header>


<!-- Nav -->
    <ul id="main-nav">

        <li><a href="Home Page.html">Home</a></li>
        <li><a href="Interactive Map.html">Interactive Map</a></li>
        <li><a href="Contact Us.html">Contact Us</a></li>
        <li><a href="Learn About Us.html">Learn About Us</a></li>

    </ul>


    <div class="content">
        <p style="font-size: 55px;">Law For Kidz</p>
        <p style="font-size: 40px;">Learn about law and important legal cases in an easy and fun way!</p>
    </div>

    <div class="button-nav">
      <button class="map-button" onclick="location.href='Interactive Map.html'">
        <div class="content-inside">
          <div class="emoji">🌍</div>
          <div class="button-text">Explore the <strong>Interactive Map</strong></div>
          <div class="button-text">To discover legal cases</div>
          <div class="button-text">country by country</div>
        </div>
      </button>

      <button class="contact-button" onclick="location.href='Contact Us.html'">
        <div class="content-inside">
          <div class="emoji">📱</div>
          <div class="button-text">Access the <strong>Contact Us Page</strong></div>
          <div class="button-text">To provide feedback</div>
          <div class="button-text">about the website</div>
        </div>
      </button>

      <button class="learn-button" onclick="location.href='Learn About Us.html'">
        <div class="content-inside">
          <div class="emoji">💡</div>
          <div class="button-text">Read the <strong>Learn About Us Page</strong></div>
          <div class="button-text">Learn about the origins</div>
          <div class="button-text">of the website</div>
        </div>
      </button>

      <div class="daycontain">
          <div class="wordday"><p>Legal Word of The Day</p></div>
          <div class="wordinfo">
              <div id="word">Hello</div>
              <div id="definition">Hello</div>
          </div>
      </div>

    </div>


<script>
    document.addEventListener('DOMContentLoaded', function() {
        const loader = document.getElementById('loader');

        const nav = document.getElementById('main-nav');

        nav.addEventListener('click', function(event) {
          if (event.target.tagName === 'A') {
            event.preventDefault();

            const destination = event.target.href;

            loader.style.display = 'flex';

            setTimeout(function() {
              window.location.href = destination;
            }, 500); // 500ms delay
          }
        });

        const words = [
            { word: "Jurisdiction", definition: "The official authority of a court or legal body to make decisions and judgments." },
            { word: "Litigation", definition: "The process of taking legal action or resolving disputes in court." },
            { word: "Defendant", definition: "A person or party accused of a crime or being sued in a lawsuit." },
            { word: "Plaintiff", definition: "A person or party who brings a case against another in court." },
            { word: "Verdict", definition: "A formal decision made by a jury or judge in a legal case." },
            { word: "Subpoena", definition: "A legal document ordering someone to appear in court or produce evidence." },
            { word: "Affidavit", definition: "A written statement confirmed by oath, used as evidence in court." },
            { word: "Testimony", definition: "A formal written or spoken statement given in court under oath." },
            { word: "Appeal", definition: "A request to a higher court to review and change a decision made by a lower court." },
            { word: "Contract", definition: "A legally binding agreement between two or more parties." },
            { word: "Liability", definition: "Legal responsibility for one's actions or omissions." },
            { word: "Negligence", definition: "Failure to take proper care, resulting in damage or harm to another." },
            { word: "Injunction", definition: "A court order requiring a person to do or stop doing a specific action." },
            { word: "Statute", definition: "A written law passed by a legislative body." },
            { word: "Prosecution", definition: "The legal party responsible for presenting a case against someone accused of a crime." }
        ];

        function setWordOfTheDay() {
            const date = new Date();
            const index = date.getDate() % words.length;

            document.getElementById("word").innerText = words[index].word;
            document.getElementById("definition").innerText = words[index].definition;

            console.log("Updated word at minute:", date.getDate());
        }

        setWordOfTheDay();

        setInterval(setWordOfTheDay, 86400000);

});

</script>

</body>
</html>
